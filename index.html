<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>KöRum — Rehearse Tomorrow’s Venue Today</title>

  <meta
    name="description"
    content="KöRum helps choirs rehearse tomorrow’s venue today through virtual acoustic simulation."
  />

  <meta name="theme-color" content="#22334A" />

  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />

  <style>
    :root {
      --hall-blue: #22334A;
      --nordic: #7C99B4;
      --self-amber: #E3A54F;
      --ice: #E9EFF4;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      background: var(--ice);
      color: var(--hall-blue);
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
    }

    main {
      width: min(920px, 100%);
      animation: fade-in 0.9s ease-out both;
    }

    .logo {
      display: block;
      width: min(760px, 92vw);
      height: auto;
      margin: 0 auto;
    }

    .status {
      margin: 34px 0 0;
      font-size: clamp(16px, 2vw, 20px);
      font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--hall-blue);
    }

    .domain {
      margin: 12px 0 0;
      font-size: 15px;
      color: var(--nordic);
    }

    @keyframes fade-in {
      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      main {
        animation: none;
      }
    }
  </style>
</head>

<body>
  <main>
    <img
      class="logo"
      src="Korum-logo.svg"
      alt="KöRum — Rehearse tomorrow’s venue today"
    />

    <p class="status">LAUNCHING SOON</p>
    <p class="domain">korum.pro</p>
  </main>
</body>
</html>
